name: Build clang-format

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x86_64
            os: linux
          - runner: ubuntu-24.04-arm
            arch: aarch64
            os: linux
          - runner: macos-15-intel
            arch: x86_64
            os: macos
          - runner: macos-15
            arch: aarch64
            os: macos
          - runner: windows-2025
            arch: x86_64
            os: windows
          - runner: windows-11-arm
            arch: aarch64
            os: windows

    name: ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout LLVM
        uses: actions/checkout@v4
        with:
          repository: llvm/llvm-project
          ref: llvmorg-20.1.0
          fetch-depth: 1

      - name: Configure
        shell: bash
        run: |
          extra_flags=()
          case "${{ matrix.os }}" in
            linux)
              extra_flags+=(
                -DLLVM_BUILD_STATIC=ON
                -DCMAKE_CXX_FLAGS="-s -flto"
              )
              ;;
            macos)
              extra_flags+=(
                -DCMAKE_CXX_FLAGS="-static-libgcc -static-libstdc++ -flto -ffunction-sections -fdata-sections"
                -DCMAKE_EXE_LINKER_FLAGS="-Wl,-dead_strip"
                -DLLVM_ENABLE_ZSTD=OFF
                -DLLVM_ENABLE_ZLIB=OFF
              )
              ;;
            windows)
              extra_flags+=(
                -DLLVM_USE_CRT_MINSIZEREL=MT
              )
              ;;
          esac
          cmake -S llvm \
                -B build \
                -DCMAKE_BUILD_TYPE=MinSizeRel \
                -DLLVM_ENABLE_PROJECTS="clang" \
                -DBUILD_SHARED_LIBS=OFF \
                "${extra_flags[@]}"

      - name: Build clang-format
        shell: bash
        run: cmake --build build --target clang-format --config MinSizeRel

      - name: Smoke test
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows" ]; then
            build/MinSizeRel/bin/clang-format.exe --version
          else
            build/bin/clang-format --version
          fi

      - name: Package
        shell: bash
        run: |
          dir="clang-format-20.1.0-${{ matrix.arch }}-${{ matrix.os }}/bin"
          mkdir -p "$dir"
          if [ "${{ matrix.os }}" = "windows" ]; then
            cp build/MinSizeRel/bin/clang-format.exe "$dir/"
          else
            cp build/bin/clang-format "$dir/"
          fi
          tar czf "clang-format-20.1.0-${{ matrix.arch }}-${{ matrix.os }}.tar.gz" \
            "clang-format-20.1.0-${{ matrix.arch }}-${{ matrix.os }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: clang-format-20.1.0-${{ matrix.arch }}-${{ matrix.os }}
          path: clang-format-20.1.0-${{ matrix.arch }}-${{ matrix.os }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect archives and compute hashes
        run: |
          mkdir release
          find artifacts -name '*.tar.gz' -exec cp {} release/ \;
          cd release
          sha256sum *.tar.gz | tee sha256sums.txt

      - name: Write job summary
        run: |
          echo '## SHA256 Hashes' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat release/sha256sums.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v20.1.0
          name: clang-format 20.1.0
          body: |
            Static clang-format binaries built from LLVM 20.1.0.
          files: |
            release/*.tar.gz
            release/sha256sums.txt
